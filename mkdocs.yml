site_name: Minerva CdG Evolution 2.0 — Documentación
site_url: https://romanforns.github.io/Documentaci-n_Minerva_CdG_2.0/
repo_url: https://github.com/Romanforns/Documentaci-n_Minerva_CdG_2.0
repo_name: Documentaci-n_Minerva_CdG_2.0

theme:
  name: material
  locale: es
  language: es
  icon:
    repo: fontawesome/brands/github
  logo: imagen.png
  favicon: imagen.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: molins
      accent: molins
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: molins
      accent: molins
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.instant
    - content.code.copy
    - content.action.edit

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

copyright: '&copy; Molins 2026'

nav:
  - Inicio: README.md
  - Flujo ingesta PowerApps: flujo-ingesta-powerapps-trigger-databricks.md

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: es
